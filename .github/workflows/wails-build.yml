name: Wails Build

on:
  push:
    branches: [wails-tool] # 触发分支
    tags: ["v*"] # 推送标签时触发（通常用于 Release）
  pull_request:
    branches: [wails-tool]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    strategy:
      # 如果一个平台失败，不要停止其他平台的构建
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output: build/bin/*.exe
          - os: macos-latest
            platform: darwin/universal
            output: build/bin/*.app
          - os: ubuntu-latest
            platform: linux/amd64
            output: build/bin/*

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 安装 Go 环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23" # 根据你的 wails.json 建议版本调整
          check-latest: true

      # 2. 安装 Node.js (用于构建前端)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. 安装 Linux 依赖 (仅在 Ubuntu 运行)
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      # 4. 安装 Wails CLI
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # 5. 构建应用
      # -ns: 不生成符号表 (减小体积)
      # -platform: 指定平台
      - name: Build Wails App
        run: |
          wails build -platform ${{ matrix.platform }} -clean -ns

      # 6. 上传构建产物 (Artifacts)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wails-binaries-${{ matrix.os }}
          path: ${{ matrix.output }}
